<style>
* { -webkit-tap-highlight-color: transparent; }
body {
  background: #F8F9F8;
  font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
  color: #4E4848;
  min-height: 100dvh;
}
.page { display: none; opacity: 0; transform: translateY(6px); transition: opacity 0.28s ease, transform 0.28s ease; }
.page.active { display: block; opacity: 1; transform: translateY(0); }

/* Custom checkbox */
.custom-check { display: none; }
.check-label {
  display: flex; align-items: flex-start; gap: 12px; cursor: pointer;
  padding: 12px 0; border-bottom: 1px solid #EDE9E4;
}
.check-label:last-child { border-bottom: none; }
.check-box {
  width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid #D4CFC9;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  margin-top: 1px; transition: all 0.18s ease; background: white;
}
.custom-check:checked + .check-label .check-box {
  background: #C97D60; border-color: #C97D60;
}
.custom-check:checked + .check-label .check-box::after {
  content: ''; width: 6px; height: 10px;
  border-right: 2px solid white; border-bottom: 2px solid white;
  transform: rotate(45deg) translate(-1px, -1px);
}
.custom-check:checked + .check-label .check-text {
  text-decoration: line-through; color: #A89F94;
}

/* Details styling */
details summary { list-style: none; cursor: pointer; }
details summary::-webkit-details-marker { display: none; }
details[open] .chevron { transform: rotate(180deg); }
.chevron { transition: transform 0.2s ease; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #D4CFC9; border-radius: 4px; }

/* Timeline dot */
.tl-dot { 
  width: 10px; height: 10px; border-radius: 50%;
  background: #EDE9E4; flex-shrink: 0; margin-top: 5px;
  border: 2px solid #C9C3BB;
}
.tl-dot.accent { background: #C97D60; border-color: #C97D60; }
.tl-line { width: 1px; background: #EDE9E4; flex: 1; margin: 2px 0; }

/* Tab active */
.tab-btn { transition: all 0.18s ease; }
.tab-btn.active .tab-icon { color: #C97D60; }
.tab-btn.active .tab-label { color: #C97D60; font-weight: 500; }
.tab-btn .tab-icon { color: #C9C3BB; }
.tab-btn .tab-label { color: #A89F94; font-size: 11px; }

/* Image preview */
.expense-img { width: 48px; height: 48px; object-fit: cover; border-radius: 10px; flex-shrink: 0; }

/* Input focus */
input:focus, textarea:focus, select:focus {
  outline: none; border-color: #C97D60 !important; box-shadow: 0 0 0 3px rgba(201,125,96,0.12);
}

/* Fade in */
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.4s ease forwards; }
.fade-up-1 { animation-delay: 0.05s; opacity: 0; }
.fade-up-2 { animation-delay: 0.1s; opacity: 0; }
.fade-up-3 { animation-delay: 0.15s; opacity: 0; }
.fade-up-4 { animation-delay: 0.2s; opacity: 0; }
.fade-up-5 { animation-delay: 0.25s; opacity: 0; }
.fade-up-6 { animation-delay: 0.3s; opacity: 0; }

/* Pill tag */
.pill { font-size: 11px; padding: 2px 10px; border-radius: 100px; background: #F0EDE9; color: #A89F94; font-weight: 500; }
.pill.accent { background: #F5EDE8; color: #C97D60; }

.info-btn {
  display: flex; align-items: center; gap: 12px; padding: 14px 16px;
  border-radius: 14px; background: white; border: 1px solid #EDE9E4;

.info-btn:active { transform: scale(0.98); background: #F8F9F8; }

.section-title {
  font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: #A89F94; margin-bottom: 12px; margin-top: 28px;
}
</style>
</head>
<body>

      <!-- Add Expense -->

        <div style="display:flex; gap:12px; margin-bottom:14px;">
          <label for="expense-photo" style="cursor:pointer; width:72px; height:72px; border-radius:14px; border:1.5px dashed #D4CFC9; display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0; background:#FAFAFA; transition:all 0.15s;">

            <img id="photo-img" style="width:100%; height:100%; object-fit:cover;"/>
            <button onclick="clearPhoto()" style="position:absolute; top:2px; right:2px; width:18px; height:18px; border-radius:50%; background:rgba(0,0,0,0.4); color:white; border:none; font-size:10px; display:flex; align-items:center; justify-content:center;">✕</button>

          <div style="flex:1; display:flex; flex-direction:column; gap:10px;">
            <input id="expense-name" type="text" placeholder="品項名稱"

            </div>
          </div>
        </div>
        <button onclick="addExpense()" style="width:100%; padding:13px; border-radius:12px; background:#4E4848; color:white; font-size:14px; font-weight:500; border:none; letter-spacing:0.02em;">
          新增記錄

      </div>

      <!-- Expense List -->
      <div style="display:flex; align-items:center; justify-content:space-between; margin-top:0;">

        <div id="total-display" style="font-size:13px; color:#C97D60; font-weight:600; margin-top:20px;"></div>
      </div>
      <div id="expense-list" style="margin-top:12px; display:flex; flex-direction:column; gap:10px;"></div>
    </div>

    <!-- ===== LISTS PAGE ===== -->
    <div id="page-lists" class="page" style="padding:0 16px 8px;">
      <!-- Packing List -->
      <div class="section-title fade-up fade-up-1">必備物品</div>
      <div class="fade-up fade-up-1" style="background:white; border-radius:20px; border:1px solid #EDE9E4; box-shadow:0 1px 4px rgba(78,72,72,0.04); padding:16px 20px;">
        <div id="packing-list"></div>
        <div style="display:flex; gap:8px; margin-top:14px; padding-top:14px; border-top:1px solid #EDE9E4;">
          <input id="new-packing" type="text" placeholder="新增物品…"
            style="flex:1; padding:9px 14px; border-radius:10px; border:1.5px solid #EDE9E4; font-size:14px; background:#FAFAFA;"/>
          <button onclick="addPackingItem()" style="padding:9px 16px; border-radius:10px; background:#F5EDE8; color:#C97D60; font-size:14px; border:none; font-weight:500;">+</button>

        <div style="display:flex; gap:8px; margin-top:14px; padding-top:14px; border-top:1px solid #EDE9E4;">

          <div style="width:36px; height:36px; border-radius:10px; background:#EBF5FF; display:flex; align-items:center; justify-content:center; flex-shrink:0;">

          </div>

          <span style="font-size:13px; font-weight:500;">關西機場</span>

<script>
// ============================================================
// DATA
// ============================================================
const TRIP = {
  name: '2026 家族關西之旅',
  dates: '7月18日（六）～ 7月23日（四）',
  subtitle: '神戶 · 姬路 · 大阪',
};

function loadStorage(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
}
function saveStorage(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

};

// ============================================================
// TAB SWITCHING
// ============================================================
function switchTab(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const page = document.getElementById('page-' + name);
  page.classList.add('active');
  btn.classList.add('active');
  // Show day tabs only on plan page; adjust main padding accordingly
  const dayBar = document.getElementById('day-tabs-bar');
  const main = document.querySelector('main');
  if (name === 'plan') {
    dayBar.style.display = 'block';
    main.style.paddingTop = '130px';
  } else {
    dayBar.style.display = 'none';
    main.style.paddingTop = '82px';
  }
  window.scrollTo(0, 0);
}

// ============================================================
// DAY TABS
// ============================================================
let activeDayIndex = 0;

function initDayTabs() {
  const labels = ['D1\n7/18', 'D2\n7/19', 'D3\n7/20', 'D4\n7/21', 'D5\n7/22', '✈\n7/23'];
  const inner = document.getElementById('day-tabs-inner');
  inner.innerHTML = labels.map((l, i) => {
    const parts = l.split('\n');
    const isActive = i === 0;
    return `<button class="day-tab${isActive ? ' active' : ''}" data-day="${i}" onclick="switchDay(${i},this)" style="display:inline-flex; flex-direction:column; align-items:center; padding:6px 13px; border-radius:12px; border:1.5px solid ${isActive ? '#C97D60' : '#EDE9E4'}; background:${isActive ? '#F5EDE8' : 'white'}; cursor:pointer; white-space:nowrap; transition:all 0.18s; min-width:46px;">
      <span style="font-size:10px; font-weight:700; color:${isActive ? '#C97D60' : '#A89F94'}; letter-spacing:0.06em;">${parts[0]}</span>
      <span style="font-size:10px; color:${isActive ? '#C97D60' : '#A89F94'}; margin-top:1px;">${parts[1]}</span>
    </button>`;
  }).join('');
}

function switchDay(index, btn) {
  activeDayIndex = index;
  // Update tab styles
  document.querySelectorAll('.day-tab').forEach((b, i) => {
    const isActive = i === index;
    b.style.border = `1.5px solid ${isActive ? '#C97D60' : '#EDE9E4'}`;
    b.style.background = isActive ? '#F5EDE8' : 'white';
    b.querySelectorAll('span').forEach(s => s.style.color = isActive ? '#C97D60' : '#A89F94');
  });
  renderItinerary();
  document.querySelector('main').scrollTop = 0;
}

function renderItinerary() {
  const container = document.getElementById('itinerary-container');
  const d = DAYS[activeDayIndex];
  const i = activeDayIndex;

  container.innerHTML = `
    <div class="fade-up fade-up-1" style="margin-top:8px;">
      <!-- Day Header -->
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px; padding:0 4px;">
        <div style="width:44px; height:44px; border-radius:12px; background:${d.day===6?'#4E4848':'#F5EDE8'}; display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0;">
          <span style="font-size:9px; font-weight:600; color:${d.day===6?'rgba(255,255,255,0.6)':'#C97D60'}; letter-spacing:0.08em; text-transform:uppercase;">${d.day===6?'FLY':'DAY'}</span>
          <span style="font-size:18px; font-weight:700; color:${d.day===6?'white':'#C97D60'}; line-height:1;">${d.day}</span>
        </div>
        <div style="flex:1; min-width:0;">
          <div style="font-size:17px; font-weight:600; color:#4E4848; line-height:1.2;">${d.title}</div>
          <div style="font-size:12px; color:#A89F94; margin-top:2px;">${d.date} &nbsp;·&nbsp; ${d.transport}</div>
          <div style="font-size:12px; color:#C97D60; margin-top:1px; font-weight:500;">${d.subtitle}</div>
        </div>
      </div>

      ${d.alert ? `<div style="background:#FFF8F5; border:1px solid #F5EDE8; border-radius:12px; padding:10px 14px; margin-bottom:10px; font-size:13px; color:#C97D60;">${d.alert}</div>` : ''}

      <!-- Main Card -->
      <div style="background:white; border-radius:20px; border:1px solid #EDE9E4; box-shadow:0 1px 4px rgba(78,72,72,0.04), 0 4px 20px rgba(78,72,72,0.05); overflow:hidden;">
        <!-- Schedule -->
        <div style="padding:16px 20px 8px;">
          <div style="font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:#A89F94; margin-bottom:14px;">行程安排</div>
          ${d.schedule.map((s, si) => `
            <div style="display:flex; gap:14px;">
              <div style="display:flex; flex-direction:column; align-items:center; width:12px; flex-shrink:0;">
                <div class="tl-dot${s.accent ? ' accent' : ''}"></div>
                ${si < d.schedule.length-1 ? '<div class="tl-line" style="min-height:28px;"></div>' : ''}
              </div>
              <div style="flex:1; padding-bottom:${si < d.schedule.length-1 ? '0' : '4'}px; min-width:0;">
                <div style="display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;">
                  <span style="font-size:12px; font-weight:600; color:${s.accent ? '#C97D60' : '#A89F94'}; font-variant-numeric:tabular-nums; white-space:nowrap;">${s.time}</span>
                  <span style="font-size:14px; font-weight:500; color:#4E4848; line-height:1.3;">${s.title}</span>
                </div>
                ${s.note ? `<div style="font-size:12.5px; color:#A89F94; line-height:1.6; margin-top:3px; padding-bottom:${si < d.schedule.length-1 ? '10' : '0'}px;">${s.note}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>

        <!-- Tips accordion -->
        <details style="border-top:1px solid #EDE9E4;">
          <summary style="padding:14px 20px; display:flex; align-items:center; justify-content:space-between;">
            <span style="font-size:13px; font-weight:500; color:#4E4848; display:flex; align-items:center; gap:8px;">
              <i class="fa-solid fa-circle-exclamation" style="color:#C97D60; font-size:13px;"></i>

            </span>
            <i class="fa-solid fa-chevron-down chevron" style="color:#A89F94; font-size:12px;"></i>
          </summary>
          <div style="padding:0 20px 16px; background:#FAFAF9;">
            ${d.tips.map(t => `
              <div style="display:flex; gap:8px; align-items:flex-start; padding:5px 0;">
                <i class="fa-solid fa-check" style="color:#C97D60; font-size:11px; margin-top:3px; flex-shrink:0;"></i>

        <!-- Footer actions -->
        <div style="padding:12px 16px; background:#FAFAF9; border-top:1px solid #EDE9E4; display:flex; gap:8px; align-items:center;">

            <i class="fa-solid fa-location-dot" style="color:#C97D60; font-size:12px;"></i> Maps

        </div>
      </div>

      <!-- Prev / Next nav -->
      <div style="display:flex; gap:10px; margin-top:16px; margin-bottom:8px;">
        ${activeDayIndex > 0 ? `<button onclick="switchDay(${activeDayIndex-1}, document.querySelectorAll('.day-tab')[${activeDayIndex-1}])" style="flex:1; padding:12px; border-radius:14px; border:1.5px solid #EDE9E4; background:white; color:#A89F94; font-size:13px; font-weight:500; display:flex; align-items:center; justify-content:center; gap:6px;"><i class="fa-solid fa-chevron-left" style="font-size:11px;"></i> 上一天</button>` : '<div style="flex:1;"></div>'}
        ${activeDayIndex < DAYS.length-1 ? `<button onclick="switchDay(${activeDayIndex+1}, document.querySelectorAll('.day-tab')[${activeDayIndex+1}])" style="flex:1; padding:12px; border-radius:14px; border:1.5px solid #EDE9E4; background:white; color:#4E4848; font-size:13px; font-weight:500; display:flex; align-items:center; justify-content:center; gap:6px;">下一天 <i class="fa-solid fa-chevron-right" style="font-size:11px;"></i></button>` : '<div style="flex:1;"></div>'}
      </div>
    </div>
  `;
}

// ============================================================
// RENDER: LISTS
// ============================================================
function renderList(type) {
  const items = state[type === 'packing' ? 'packing' : 'shopping'];
  const container = document.getElementById(type + '-list');
  container.innerHTML = items.map((item, i) => `
    <div>
      <input type="checkbox" id="${type}-${i}" class="custom-check" ${item.done ? 'checked' : ''}
        onchange="toggleItem('${type}',${i},this.checked)"/>
      <label for="${type}-${i}" class="check-label">
        <div class="check-box"></div>
        <span class="check-text" style="font-size:14px; color:#4E4848; line-height:1.5; flex:1;">${item.text}</span>
        <button onclick="event.preventDefault();deleteItem('${type}',${i})" style="padding:4px 8px; border:none; background:none; color:#D4CFC9; font-size:13px; flex-shrink:0;">✕</button>
      </label>
    </div>
  `).join('');
}

function toggleItem(type, i, done) {
  const key = type === 'packing' ? 'packing' : 'shopping';
  state[key][i].done = done;
  saveStorage('trip_' + key, state[key]);
  renderList(key);
}

function deleteItem(type, i) {
  const key = type === 'packing' ? 'packing' : 'shopping';
  state[key].splice(i, 1);
  saveStorage('trip_' + key, state[key]);
  renderList(key);
}

function addPackingItem() {
  const inp = document.getElementById('new-packing');
  const txt = inp.value.trim();
  if (!txt) return;
  state.packing.push({ text: txt, done: false });
  saveStorage('trip_packing', state.packing);
  inp.value = '';
  renderList('packing');
}

function addShoppingItem() {
  const inp = document.getElementById('new-shopping');
  const txt = inp.value.trim();
  if (!txt) return;
  state.shopping.push({ text: txt, done: false });
  saveStorage('trip_shopping', state.shopping);
  inp.value = '';
  renderList('shopping');
}

// Memo
function initMemo() {
  const ta = document.getElementById('memo-text');
  ta.value = state.memo;
  ta.addEventListener('input', () => {
    state.memo = ta.value;
    saveStorage('trip_memo', state.memo);
  });
}

// ============================================================
// RENDER: WALLET
// ============================================================
function initWallet() {
  document.getElementById('exchange-rate').value = state.rate;

  const jpyInput = document.getElementById('jpy-input');
  jpyInput.addEventListener('input', updateConversion);

  renderExpenses();
  updateTotalDisplay();
}

function updateConversion() {
  const raw = document.getElementById('jpy-input').value.trim();
  if (!raw) { document.getElementById('twd-result').textContent = '—'; return; }
  try {
    const jpy = eval(raw.replace(/[^0-9+\-*/().]/g, ''));
    if (isNaN(jpy)) { document.getElementById('twd-result').textContent = '—'; return; }
    const twd = Math.round(jpy * state.rate);
    document.getElementById('twd-result').textContent = 'NT$ ' + twd.toLocaleString();
  } catch { document.getElementById('twd-result').textContent = '—'; }
}

function saveRate() {
  const r = parseFloat(document.getElementById('exchange-rate').value);
  if (isNaN(r) || r <= 0) return;
  state.rate = r;
  saveStorage('trip_rate', r);
  updateConversion();
  updateTotalDisplay();
  renderExpenses();
}

let photoData = null;
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('expense-photo').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      photoData = ev.target.result;
      document.getElementById('photo-img').src = photoData;
      document.getElementById('photo-preview').style.display = 'block';
    };
    reader.readAsDataURL(file);
  });
});

function clearPhoto() {
  photoData = null;
  document.getElementById('photo-preview').style.display = 'none';
  document.getElementById('expense-photo').value = '';
}

function addExpense() {
  const name = document.getElementById('expense-name').value.trim();
  const raw = document.getElementById('expense-amount').value.trim();
  if (!name || !raw) return;
  let jpy = 0;
  try { jpy = eval(raw.replace(/[^0-9+\-*/().]/g, '')); } catch {}
  if (isNaN(jpy) || jpy <= 0) { alert('請輸入有效金額'); return; }
  const expense = {
    id: Date.now(),
    name, jpy: Math.round(jpy),
    twd: Math.round(jpy * state.rate),
    photo: photoData,
    time: new Date().toLocaleString('zh-TW', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })
  };
  state.expenses.unshift(expense);
  saveStorage('trip_expenses', state.expenses);
  document.getElementById('expense-name').value = '';
  document.getElementById('expense-amount').value = '';
  document.getElementById('twd-result').textContent = '—';
  clearPhoto();
  renderExpenses();
  updateTotalDisplay();
}

function deleteExpense(id) {
  state.expenses = state.expenses.filter(e => e.id !== id);
  saveStorage('trip_expenses', state.expenses);
  renderExpenses();
  updateTotalDisplay();
}

function renderExpenses() {
  const container = document.getElementById('expense-list');
  if (state.expenses.length === 0) {
    container.innerHTML = '<div style="text-align:center; padding:32px; color:#A89F94; font-size:14px;">還沒有消費紀錄<br/><span style="font-size:12px; margin-top:4px; display:block;">出發後開始記錄你的每一筆花費</span></div>';
    return;
  }
  container.innerHTML = state.expenses.map(e => `
    <div style="background:white; border-radius:16px; border:1px solid #EDE9E4; padding:14px 16px; display:flex; align-items:center; gap:12px;">
      ${e.photo
        ? `<img src="${e.photo}" class="expense-img" alt=""/>`
        : `<div style="width:48px; height:48px; border-radius:10px; background:#F0EDE9; display:flex; align-items:center; justify-content:center; flex-shrink:0;"><i class="fa-solid fa-yen-sign" style="color:#C9C3BB; font-size:16px;"></i></div>`
      }
      <div style="flex:1; min-width:0;">
        <div style="font-size:14px; font-weight:500; color:#4E4848; line-height:1.3;">${e.name}</div>
        <div style="font-size:11px; color:#A89F94; margin-top:2px;">${e.time}</div>
      </div>
      <div style="text-align:right; flex-shrink:0; margin-right:8px;">
        <div style="font-size:16px; font-weight:600; color:#C97D60;">¥${e.jpy.toLocaleString()}</div>
        <div style="font-size:11px; color:#A89F94;">NT$${e.twd.toLocaleString()}</div>
      </div>
      <button onclick="deleteExpense(${e.id})" style="padding:6px; background:none; border:none; color:#D4CFC9; font-size:14px; flex-shrink:0;">
        <i class="fa-solid fa-trash-can"></i>
      </button>
    </div>
  `).join('');
}

function updateTotalDisplay() {
  const totalJpy = state.expenses.reduce((s, e) => s + e.jpy, 0);
  const totalTwd = Math.round(totalJpy * state.rate);
  const el = document.getElementById('total-display');
  if (totalJpy > 0) {
    el.textContent = `共 ¥${totalJpy.toLocaleString()} / NT$${totalTwd.toLocaleString()}`;
  } else {
    el.textContent = '';
  }
}

// ============================================================
// RENDER: INFO
// ============================================================
function renderInfo() {
  // Emergency
  const ec = document.getElementById('emergency-contacts');
  ec.innerHTML = EMERGENCY.map(e => `
    <a href="tel:${e.number}" style="display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius:12px; text-decoration:none; transition:background 0.15s;" onmouseenter="this.style.background='#F8F9F8'" onmouseleave="this.style.background='transparent'">
      <div style="width:36px; height:36px; border-radius:10px; background:${e.color}15; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
        <i class="fa-solid ${e.icon}" style="color:${e.color}; font-size:14px;"></i>
      </div>
      <div style="flex:1;">
        <div style="font-size:13px; font-weight:500; color:#4E4848;">${e.label}</div>
        <div style="font-size:14px; color:#C97D60; font-weight:600; margin-top:1px;">${e.number}</div>
      </div>
      <i class="fa-solid fa-phone" style="color:#A89F94; font-size:13px;"></i>
    </a>
  `).join('');

  // Hotels
  const hc = document.getElementById('hotel-info-cards');
  hc.innerHTML = HOTELS.map(h => `
    <div style="background:white; border-radius:18px; border:1px solid #EDE9E4; box-shadow:0 1px 4px rgba(78,72,72,0.04); padding:18px 20px; margin-bottom:10px;">
      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px;">
        <div>
          <div style="font-size:13px; color:#A89F94; margin-bottom:4px;">${h.period}</div>
          <div style="font-size:15px; font-weight:600; color:#4E4848; margin-bottom:8px;">${h.location}</div>
          <div style="font-size:12.5px; color:#A89F94; line-height:1.7; white-space:pre-line;">${h.address}</div>
        </div>
        <a href="${h.mapLink}" target="_blank" style="display:flex; align-items:center; gap:6px; padding:8px 12px; border-radius:10px; background:#F5EDE8; text-decoration:none; color:#C97D60; font-size:12px; font-weight:500; white-space:nowrap; flex-shrink:0;">
          <i class="fa-solid fa-location-dot"></i> 地圖
        </a>
      </div>
    </div>
  `).join('');

  // Rules
  const rc = document.getElementById('trip-rules');
  rc.innerHTML = RULES.map((r, i) => `
    <div style="display:flex; gap:10px; align-items:flex-start; padding:7px 0; ${i < RULES.length-1 ? 'border-bottom:1px solid #EDE9E4;' : ''}">
      <div style="width:22px; height:22px; border-radius:6px; background:#F5EDE8; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px;">
        <span style="font-size:11px; font-weight:700; color:#C97D60;">${i+1}</span>
      </div>
      <span style="font-size:13.5px; color:#4E4848; line-height:1.6;">${r}</span>
    </div>
  `).join('');

  // Tips
  const tc = document.getElementById('travel-tips');
  tc.innerHTML = TIPS.map(t => `
    <div style="background:white; border-radius:16px; border:1px solid #EDE9E4; padding:16px 18px; display:flex; gap:14px; align-items:flex-start;">
      <div style="width:38px; height:38px; border-radius:11px; background:${t.bg}; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
        <i class="fa-solid ${t.icon}" style="color:${t.color}; font-size:15px;"></i>
      </div>
      <div style="flex:1; min-width:0;">
        <div style="font-size:14px; font-weight:600; color:#4E4848; margin-bottom:4px;">${t.title}</div>
        <div style="font-size:13px; color:#A89F94; line-height:1.65;">${t.body}</div>
        ${t.link ? `<a href="${t.link}" target="_blank" style="display:inline-flex; align-items:center; gap:5px; margin-top:8px; font-size:12px; color:#C97D60; font-weight:500; text-decoration:none;"><i class="fa-solid fa-arrow-up-right-from-square" style="font-size:10px;"></i> 查看參考文章</a>` : ''}
      </div>
    </div>
  `).join('');
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  initDayTabs();
  renderItinerary();
  renderList('packing');
  renderList('shopping');
  initMemo();
  initWallet();
  renderInfo();

  // Enter key for list inputs
  document.getElementById('new-packing').addEventListener('keypress', e => { if (e.key === 'Enter') addPackingItem(); });
  document.getElementById('new-shopping').addEventListener('keypress', e => { if (e.key === 'Enter') addShoppingItem(); });
});
</script>
</body>
</html>
